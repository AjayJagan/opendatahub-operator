name: Update branches and create pr
on:
  workflow_call:
    inputs:
      title:
        required: true
        type: string
      branch:
        required: true
        type: string
      commit-message:
        required: true
        type: string
      close-pr-and-push-tags:
        required: true
        type: boolean
        default: false
jobs:
  update-branches-and-create-pr:
    permissions: write-all
    runs-on: ubuntu-latest
    name: Create e2e test pr and optionallly update image tags
    steps:
      - uses: actions/checkout@v4
      - name: Update branches in get_all_manifest.sh
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
      - run: npm install @octokit/action
      - uses: actions/github-script@v7
        with:
          script: |
            const script = require('./.github/scripts/get-release-branches.js')
            console.log(script({core}))
      - name: cleanup node_modules
        run: rm -rf node_modules && rm package*.json
      - name: Update versions
        run: ./.github/scripts/update-manifests-tags.sh ${{ env.CODEFLARE }} ${{ env.KUBERAY }} ${{ env.KUEUE }} ${{ env.DSP }} ${{ env.DASHBOARD }} ${{ env.NOTEBOOK-CONTROLLER }} ${{ env.NOTEBOOK-CONTROLLER }} ${{ env.NOTEBOOKS }} ${{ env.TRUSTYAI }} ${{ env.MODELMESH }} ${{ env.ODH-MODEL-CONTROLLER }} ${{ env.KSERVE }} ${{ env.MODEL-REGISTRY }}
      - name: Create test pr
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: ${{ inputs.commit-message }}
          branch: ${{ inputs.branch }}
          delete-branch: true
          title: ${{ inputs.title }}
      - name: Wait for checks to pass
        if: ${{ inputs.close-pr-and-push-tags }}
        run: ./.github/scripts/wait-for-checks.sh ${{ steps.cpr.outputs.pull-request-number }}
      - name: Close PR
        uses: peter-evans/close-pull@v3
        with:
          pull-request-number: ${{ steps.cpr.outputs.pull-request-number }}
          comment: Auto-closing pull request after success checks
          delete-branch: true
      - name: Push version tag to quay.io
        if: ${{ inputs.close-pr-and-push-tags }}
        run: |
          # Need ODH creds
          echo "Successfully pushed to quay!"
          # podman login -u ajaganat -p ${{ secrets.PODMAN_PASSWORD }} quay.io/ajaganat
          # podman pull quay.io/ajaganat/opendatahub-operator:pr-23
          # podman push quay.io/ajaganat/opendatahub-operator:pr-23 quay.io/ajaganat/opendatahub-operator:${{ env.VERSION }}