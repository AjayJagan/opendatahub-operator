name: "Release: Update versions"
on:
  workflow_run:
    workflows: ["Release: Update branches and test e2e"]
    types: [completed]
jobs:
  update-versions:
    permissions: write-all
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: release-context
          path: /tmp
      - name: Unzip artifact and set env
        run: |
          unzip /tmp/release-context.zip
          cat /tmp/release-context.json
