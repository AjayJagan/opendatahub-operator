name: Release ODH
on:
  pull_request:
    types:
      - closed
jobs:
  release-odh:
    if: github.event.pull_request.merged && startsWith(github.event.pull_request.title, 'ODH Release') && endsWith(github.event.pull_request.title, 'Version Update')
    runs-on: ubuntu-latest
    steps:
      - name: Get version and trackerUrl from comments
        uses: actions/github-script@v7
        with:
          script: |
            console.log(github.rest)
            const { data } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: ${{ github.event.pull_request.number }}
            })
            console.log(data)