name: Release ODH
on:
  pull_request:
    types:
      - closed
jobs:
  release-odh:
    if: github.event.pull_request.merged && startsWith(github.event.pull_request.title, 'ODH Release') && endsWith(github.event.pull_request.title, 'Version Update')
    runs-on: ubuntu-latest
    steps:
      - name: Get version from pr title
        run: |
          TITLE="ODH Release 2.8 Version Update"
          echo "VERSION=$(echo ${{ github.event.pull_request.title }} | cut -d ' ' -f 3)" >> $GITHUB_ENV
      - uses: actions/checkout@v4
      - name: Create a release branch
        run: |
          git branch odh-${{ env.VERSION }}