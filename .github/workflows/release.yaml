name: Release ODH
on:
  pull_request:
    types:
      - closed
jobs:
  release-odh:
    if: github.event.pull_request.merged && startsWith(github.event.pull_request.title, 'ODH Release') && endsWith(github.event.pull_request.title, 'Version Update')
    runs-on: ubuntu-latest
    steps:
      - name: Get version and trackerUrl from comments
        uses: actions/github-script@v7
        with:
          script: |
            const { data } = await github.rest.pulls.octokit.request('GET /repos/{owner}/{repo}/pulls/{pull_number}/comments', {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: ${{ github.event.pull_request.number }},
              headers: {
                'X-GitHub-Api-Version': '2022-11-28',
                'Accept': 'application/vnd.github.text+json'
              }
            })
            console.log(data)