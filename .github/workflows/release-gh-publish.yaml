name: "Release: GH and operatorhub publish"
on:
  pull_request:
    types:
      - closed
env:
  GITHUB_TOKEN: ${{ github.token }}
jobs:
  gh-operatorhub-release:
    permissions: write-all
    if: github.event.pull_request.merged && startsWith(github.event.pull_request.title, 'ODH') && endsWith(github.event.pull_request.title, 'Release')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set env variables
        uses: ./.github/actions/set-shared-env
        with:
          pat-token: ${{ secrets.PAT }}
      - name: Create and push version tags
        run: |
          git config --global user.email 41898282+github-actions[bot]@users.noreply.github.com
          git config --global user.name github-actions[bot]
          git checkout odh-${{ env.VERSION }}
          git tag -a -m v${{ env.VERSION }} v${{ env.VERSION }}
          git push origin v${{ env.VERSION }}
      - name: Get component release notes
        id: release-notes
        uses: actions/github-script@v7
        with:
          script: |
            const script = require('./.github/scripts/get-component-release-notes.js')
            script({github, context})
      - name: Create GH release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.release-notes.outputs.release-notes-body }}
          tag_name: v${{ env.VERSION }}
          generate_release_notes: true
          append_body: true
          make_latest: true
